<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Manager</title>
</head>
<body>
    <h1>My Bookmarks</h1>
    <h2>Primary Bookmarks</h2>
    <a href="https://www.google.com">Open Google</a>  <!-- Opens in that same tab-->
    <!-- If you want to open this link in another tab , use mouse's middle button -->
    <!-- OR change line to: -->
    <a target="_blank" href="https://www.google.com">Open Google</a>
    <!--THESE SHOWS IN ONE LINE,to avoid that use paragraphs -->
    <p>
        <a target="_blank" href="https://www.facebook.com">Open Facebook</a>
    </p>
    <p>
        <a target="_blank" href="https://www.youtube.com">Open Youtube</a>
    </p>
    <h2>Secondary Bookmarks</h2>
    <p><a target="_blank" href="https://www.quora.com">Open Quora</a></p>
    <p><a target="_blank" href="https://www.wikipedia.com">Open Wikipedia</a></p>
</body>
</html>
