<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=m , initial-scale=1.0">
    <title>Inline and Block Elements</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Hey i am nik</p>
    <a href="https://google.com">Google</a>
    <div>I am a block element</div>

    <span>I am span and i am inline</span>
    <a href="">yes he is inline</a>
</body>
</html>


<!-- 
| **Feature** | **Block Elements**     | **Inline Elements**       |
| ----------- | ---------------------- | ------------------------- |
| Line Break  | Starts on a new line   | Does not start a new line |
| Width       | Takes full width       | Takes only required width |
| Nesting     | Can contain both types | Contains only inline/text |
| Example     | `<div>`, `<p>`         | `<span>`, `<a>`           |
 -->
