<html lang="en">

<head>

        .box {

            margin: 34px;
        }
        .box1{
            /*display: none;*/
            /*visibility: hidden;*/
        }
    </style>
</head>

<body>

    <div class="box">

    </div>

    <span>I am a good</span>
    <span>Boy</span>
</body>

</html>
