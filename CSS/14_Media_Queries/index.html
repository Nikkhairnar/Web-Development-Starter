<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Query</title>
    <style>
        body{
            background-color: red;
        }

        @media only screen and (max-width: 455px){          /*means if width 455px is there,automatic color changes*/
            body{
                background-color: blue;
            }
        }
    </style>
</head>
<body>
    <div>
        I have red body!
    </div>
</body>
</html>
