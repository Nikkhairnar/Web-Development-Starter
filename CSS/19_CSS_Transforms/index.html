<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transforms</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            
        }
        .box{
            height: 50px;
            width: 50px;
            background-color: beige;
            border: 2px solid black;
            /*transform: rotate(40deg);*/   /*0.25turn*/
            /*transform: rotateZ(9deg);*/
            /*transform: scale(1.5);*/  /*scalex,scaley,skew(only for x,y axis)*/
            transform: translate(100%);  /*-100*/
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container{
            width: 100vw;
            height: 80vh;
            border: 2px solid rgb(225, 20, 20);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <p>box</p>
        </div>
    </div>
</body>
</html>
