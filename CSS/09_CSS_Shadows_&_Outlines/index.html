<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SHADOES AND OUTLINES</title>
    <style>
        .box{
            border: 2px solid black;
            padding: 34px;
            box-shadow: 5px 15px 5px #6203f088;
        }

        .text-element{
            text-shadow: 2px 2px 4px #d90b0b;
        }
    </style>
</head>
<body>
    <div class="box">
        I am a box
    </div>

    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur, adipisicing elit. Voluptatibus rerum esse magnam exercitationem. Magni odit, recusandae impedit odio magnam repudiandae culpa ad laboriosam similique voluptas illo voluptate reiciendis blanditiis nihil!
    </p>
</body>
</html>
