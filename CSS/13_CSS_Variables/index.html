<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
    <style>

        :root{
            --color: blue;   /*global variables*/
            --seccolor:rgb(171, 29, 29);
        }
        *{
            margin: 0;
            padding: 0;
        }

        .nav{
            background-color: aqua;
        }

        ul{
            display: flex;
        }

        ul li{
            list-style: none;
            padding: 34px;
        }

        ul li:first-child{
            --color: rgb(9, 182, 141);   /*local variables*/
            background-color: var(--color);
        }
        .container{
            background-color: var(--seccolor);
        }
    </style>
</head>
<body>
    <div class="nav">
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
        </ul>
    </div>

    <div class="container">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Cum obcaecati eum dolore autem consequuntur dolores delectus necessitatibus vel, libero facilis exercitationem eos optio itaque cumque architecto ab aperiam ducimus recusandae!
    </div>
</body>
</html>
