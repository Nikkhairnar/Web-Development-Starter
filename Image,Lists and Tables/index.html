<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Images</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img width="500" height="300" src="hilux.png" alt="car image">
    <br>
    <table>
        <caption>Employee Details</caption>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Fav-Language</th>
        </tr>
        <tr>
            <td>Nikk</td>
            <td>21</td>
            <td>Python</td>
        </tr>
        <tr>
            <td colspan="2">Yash</td>
            <td rowspan="2">Javascript</td>
        </tr>
        <tr>
            <td colspan="2">Yash</td>
        </tr>
    </table>


    <ul>
        <li>NIKK</li>
        <li>YASH</li>
        <li>OM</li>
    </ul>
     <ul type="square">  <!-- can also do circle,disc -->
        <li>NIKK</li>
        <li>YASH</li>
        <li>OM</li>
    </ul>
    <ol >
        <li>NIKK</li>
        <li>YASH</li>
        <li>OM</li>
    </ol>
    <ol type="I">   <!-- A,a,I,i,1 -->
        <li>NIKK</li>
        <li>YASH</li>
        <li>OM</li>
    </ol>

</body>
</html>
